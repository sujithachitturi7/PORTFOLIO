<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container app-container mt-5">
        <div class="header text-center">
            <h1>Expense Tracker</h1>
            <p class="mb-0">Track your daily, monthly and total expenses with ease.</p>
        </div>
        <div class="row mb-4">
            <div class="col-md-4 mb-3 mb-md-0">
                <div class="summary-card">
                    <h6 class="text-muted mb-2">Total Expenses</h6>
                    <div class="summary-value" id="total-expenses">$0.00</div>
                </div>
            </div>
            <div class="col-md-4 mb-3 mb-md-0">
                <div class="summary-card">
                    <h6 class="text-muted mb-2">This Month</h6>
                    <div class="summary-value" id="month-expenses">$0.00</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="summary-card">
                    <h6 class="text-muted mb-2">Average Per Day</h6>
                    <div class="summary-value" id="avg-expenses">$0.00</div>
                </div>
            </div>
        </div>
        <div class="expense-form mb-4">
            <h4 class="mb-4">Add New Expense</h4>
            <form id="expense-form">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="expense-name" class="form-label">Description</label>
                        <input type="text" class="form-control" id="expense-name" placeholder="What did
you spend on?" required>
                    </div>
                    <div class="col-md-3">
                        <label for="expense-amount" class="form-label">Amount ($)</label>
                        <input type="number" class="form-control" id="expense-amount" min="0.01" step="0.01"
                            placeholder="0.00" required>
                    </div>
                    <div class="col-md-3">
                        <label for="expense-date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="expense-date" required>
                    </div>
                    <div class="col-md-6">
                        <label for="expense-category" class="form-label">Category</label>
                        <select class="form-select" id="expense-category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Food">Food & Dining</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Housing">Housing</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Personal">Personal</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="expense-notes" class="form-label">Notes (Optional)</label>
                        <input type="text" class="form-control" id="expense-notes" placeholder="Any

additional details">
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-plus-circle me-2"></i>Add Expense
                        </button>
                    </div>
                </div>
            </form>
        </div>
        <div class="expense-list">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Your Expenses</h4>

                <div class="d-flex">
                    <select class="form-select form-select-sm me-2" id="filter-category">
                        <option value="All" selected>All Categories</option>
                        <option value="Food">Food & Dining</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Housing">Housing</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Education">Education</option>
                        <option value="Personal">Personal</option>
                        <option value="Other">Other</option>
                    </select>
                    <select class="form-select form-select-sm" id="sort-expenses">
                        <option value="date-desc" selected>Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="amount-desc">Highest Amount</option>
                        <option value="amount-asc">Lowest Amount</option>
                    </select>
                </div>
            </div>
            <div id="expenses-container">
                <div id="empty-state" class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="..." />
                    </svg>
                    <h5>No expenses yet</h5>
                    <p>Add your first expense using the form above</p>
                </div>
                <div id="expense-list" class="list-group"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-

alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
