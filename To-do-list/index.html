<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple To<!-Do List</title>
</head>

<body>
    <h2>My To-Do List</h2>

    <ul>
        <li><input type="checkbox"> Study HTML</li>
        <li><input type="checkbox"> Complete Homework</li>
        <li><input type="checkbox"> Read a Book</li>
        <li><input type="checkbox"> Exercise for 30 minutes</li>
        <li><input type="checkbox"> Meditate</li>
    </ul>

    <p>Note: This is a static to-do list. You can't save or add new tasks with
        HTML alone.</p>
</body>

</html>
